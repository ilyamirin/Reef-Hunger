<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#04172c" />
    <meta
      name="description"
      content="A hungry anemone. Falling sea creatures. One tap too late and the reef wins."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reef Hunger" />
    <meta property="og:title" content="Reef Hunger" />
    <meta
      property="og:description"
      content="Feed the anemone. Hold the reef. Tap fast, chain kills, and dodge cursed ocean junk."
    />
    <meta
      property="og:url"
      content="https://ilyamirin.github.io/Reef-Hunger/"
    />
    <meta
      property="og:image"
      content="https://ilyamirin.github.io/Reef-Hunger/social-card.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Reef Hunger social card with a glowing anemone reaching for falling sea creatures in a deep blue reef."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reef Hunger" />
    <meta
      name="twitter:description"
      content="Feed the anemone. Hold the reef. Tap fast, chain kills, and dodge cursed ocean junk."
    />
    <meta
      name="twitter:image"
      content="https://ilyamirin.github.io/Reef-Hunger/social-card.png"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Reef Hunger Arcade</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: linear-gradient(
          180deg,
          #04172c 0%,
          #062845 48%,
          #020c18 100%
        );
        color: #effcff;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .hidden {
        display: none !important;
      }

      body.booting #game-root,
      body.booting #hud,
      body.booting #game-over-overlay,
      body.booting #orientation-overlay {
        visibility: hidden;
      }

      body.booting #start-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(2, 9, 19, 0.55);
      }

      body.booting #start-overlay .overlay-card {
        width: min(320px, 100%);
        padding: 24px 20px;
        border-radius: 24px;
        border: 1px solid rgba(122, 246, 217, 0.24);
        background: linear-gradient(
          180deg,
          rgba(5, 21, 39, 0.92),
          rgba(3, 15, 30, 0.95)
        );
        text-align: center;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      }
    </style>
  </head>
  <body class="booting">
    <div id="app">
      <div id="game-shell">
        <div id="game-root" aria-label="Reef Hunger Arcade"></div>

        <div id="hud" class="hud">
          <div class="hud-row top-row">
            <div class="chip">
              <span class="chip-label">Score</span>
              <span id="score-value" class="chip-value">0</span>
            </div>
            <div class="chip">
              <span class="chip-label">Best</span>
              <span id="best-value" class="chip-value">0</span>
            </div>
            <button
              id="restart-button"
              class="control-button icon-button"
              type="button"
              aria-label="Restart run"
            >
              <span class="button-icon" aria-hidden="true">⟳</span>
            </button>
          </div>

          <div class="hud-row bottom-row">
            <div class="chip">
              <span class="chip-label">Streak</span>
              <span id="streak-value" class="chip-value">0</span>
            </div>
            <div class="chip accent">
              <span class="chip-label">Multiplier</span>
              <span id="multiplier-value" class="chip-value">x1</span>
            </div>
            <div id="species-chip" class="chip highlight hidden">
              <span class="chip-label">Species Boost</span>
              <span id="species-value" class="chip-value">4.0s</span>
            </div>
          </div>
        </div>

        <div id="start-overlay" class="overlay">
          <div class="overlay-card hero">
            <div class="reef-mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="overlay-kicker">Arcade Reef</div>
            <h1>REEF HUNGER</h1>
            <p>Tap to Hunt</p>
            <button
              id="start-button"
              class="control-button large"
              type="button"
            >
              HUNT
            </button>
          </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
          <div class="overlay-card hero">
            <div class="reef-mark danger" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="overlay-kicker">Run Ended</div>
            <h1>OVER</h1>
            <p id="game-over-score" class="overlay-score">SCORE 0 · BEST 0</p>
            <button
              id="overlay-restart-button"
              class="control-button large"
              type="button"
            >
              AGAIN
            </button>
          </div>
        </div>

        <div id="orientation-overlay" class="overlay hidden">
          <div class="overlay-card compact">
            <div class="overlay-kicker">Portrait Only</div>
            <h2>TURN UPRIGHT</h2>
          </div>
        </div>

        <footer class="game-credit-strip">
          <span>© Ilya Mirin</span>
          <span>PolyForm Noncommercial 1.0.0</span>
          <a
            href="https://www.linkedin.com/in/ilyamirin"
            target="_blank"
            rel="noreferrer noopener"
            >LinkedIn</a
          >
        </footer>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
