<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#04172c" />
    <title>Reef Hunger Arcade</title>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <div id="game-root" aria-label="Reef Hunger Arcade"></div>

        <div id="hud" class="hud">
          <div class="hud-row top-row">
            <div class="chip">
              <span class="chip-label">Score</span>
              <span id="score-value" class="chip-value">0</span>
            </div>
            <div class="chip">
              <span class="chip-label">Best</span>
              <span id="best-value" class="chip-value">0</span>
            </div>
            <button id="restart-button" class="control-button" type="button">
              Restart
            </button>
          </div>

          <div class="hud-row bottom-row">
            <div class="chip">
              <span class="chip-label">Streak</span>
              <span id="streak-value" class="chip-value">0</span>
            </div>
            <div class="chip accent">
              <span class="chip-label">Multiplier</span>
              <span id="multiplier-value" class="chip-value">x1</span>
            </div>
            <div id="species-chip" class="chip highlight hidden">
              <span class="chip-label">Species Boost</span>
              <span id="species-value" class="chip-value">4.0s</span>
            </div>
          </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
          <div class="overlay-card">
            <div class="overlay-kicker">The reef pushed through</div>
            <h1>Run Over</h1>
            <p id="game-over-score" class="overlay-score">Score 0 • Best 0</p>
            <button
              id="overlay-restart-button"
              class="control-button large"
              type="button"
            >
              Dive Again
            </button>
          </div>
        </div>

        <div id="orientation-overlay" class="overlay hidden">
          <div class="overlay-card compact">
            <div class="overlay-kicker">Portrait only</div>
            <h2>Turn the device upright</h2>
            <p>
              The anemone holds position until the screen is back in portrait.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
